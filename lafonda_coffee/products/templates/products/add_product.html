{%extends 'base.html' %}

{% block content %}

  <form action="{% url 'add_product' %}" method="post" enctype="multipart/form-data" class="mx-auto max-w-md space-y-4 rounded-lg border border-gray-300 bg-gray-100 p-6">
      {% csrf_token %}

      <!-- Nombre -->
      <div>
          <label for="id_name" class="block text-sm font-medium text-gray-900">{{ form.name.label }}</label>
          <input type="text" name="name" id="id_name"
                value="{{ form.name.value|default:'' }}"
                class="mt-2 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
          {{ form.name.errors }}
      </div>

      <!-- Descripción -->
      <div>
          <label for="id_description" class="block text-sm font-medium text-gray-900">{{ form.description.label }}</label>
          <textarea name="description" id="id_description" rows="4"
                    class="mt-2 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">{{ form.description.value|default:'' }}</textarea>
          {{ form.description.errors }}
      </div>

      <!-- Precio -->
      <div>
          <label for="id_price" class="block text-sm font-medium text-gray-900">{{ form.price.label }}</label>
          <input type="number" step="0.01" name="price" id="id_price"
                value="{{ form.price.value|default:'' }}"
                class="mt-2 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
          {{ form.price.errors }}
      </div>

      <!-- Disponible -->
      <div class="flex items-center">
          <input type="checkbox" name="available" id="id_available"
                {% if form.available.value %}checked{% endif %}
                class="h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
          <label for="id_available" class="ml-2 block text-sm text-gray-900">
              {{ form.available.label }}
          </label>
      </div>

      <!-- Foto -->
      <div>
          <label for="id_photo" class="block text-sm font-medium text-gray-900">{{ form.photo.label }}</label>
          <input type="file" name="photo" id="id_photo"
                class="mt-2 block w-full text-sm text-gray-900 border border-gray-300 rounded-md cursor-pointer focus:outline-none">
          {{ form.photo.errors }}
      </div>

      <!-- Botón -->
      <div>
          <button type="submit"
                  class="inline-flex justify-center rounded-md bg-indigo-600 px-4 py-2 text-white text-sm font-medium shadow-sm hover:bg-indigo-700">
              Guardar
          </button>
      </div>
  </form>

{% endblock content %}
